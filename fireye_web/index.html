<html>
<head>
  <title>ROS Web</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
  <!-- <script src="https://cdn.jsdelivr.net/npm/ros2d/build/ros2d.min.js"></script> -->
  <script src="main.js"></script>
</head>

<body>
  <div class="container text-center mt-5">
    <h1>ROS Web</h1>

    <button id="btn_con" class="btn btn-success m-2">Conectar</button>
    <button id="btn_dis" class="btn btn-danger m-2">Desconectar</button>

    <p id="status">Estado: desconectado</p>
  </div>
  <div id="divCamera">
    <img id="cameraFeed" src="http://localhost:8080/stream?topic=/camera/image_raw">
  </div>
  <div class="container mt-4 text-center">
    <h3>Mapa SLAM</h3>
    <canvas id="mapCanvas" style="border:1px solid black;"></canvas>
  </div>
</body>
</html>
